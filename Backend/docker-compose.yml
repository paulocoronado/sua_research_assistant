version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: sua_postgres
    environment:
      POSTGRES_USER: sua_user
      POSTGRES_PASSWORD: sua_password
      POSTGRES_DB: sua_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
